<!DOCTYPE html>
<html>
<head>
    <title>Loan Eligibility Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4 bg-light">

<div class="container" style="max-width:600px;">
    <h2 class="text-center mb-4">Loan Eligibility Predictor</h2>

    <form action="/predict" method="POST" class="card p-4 shadow">

        <label>Gender</label>
        <select class="form-control mb-3" name="Gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Married</label>
        <select class="form-control mb-3" name="Married">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label>Dependents</label>
        <select class="form-control mb-3" name="Dependents">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3+">3+</option>
        </select>

        <label>Education</label>
        <select class="form-control mb-3" name="Education">
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select class="form-control mb-3" name="Self_Employed">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome" class="form-control mb-3" required>

        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome" class="form-control mb-3" required>

        <label>Loan Amount</label>
        <input type="number" name="LoanAmount" class="form-control mb-3" required>

        <label>Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term" class="form-control mb-3" required>

        <label>Credit History (0 or 1)</label>
        <input type="number" name="Credit_History" class="form-control mb-3" min="0" max="1" required>

        <label>Property Area</label>
        <select class="form-control mb-3" name="Property_Area">
            <option value="Urban">Urban</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Rural">Rural</option>
        </select>

        <button type="submit" class="btn btn-primary w-100">
            Check Eligibility
        </button>

    </form>
</div>

</body>
</html>
