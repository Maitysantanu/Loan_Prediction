<!DOCTYPE html>
<html>
<head>
    <title>Loan Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4 bg-light">

<div class="container" style="max-width:650px;">

    <!-- Prediction Card -->
    <div class="card p-4 shadow mb-4">
        <h3 class="text-center">Loan Prediction Result</h3>

        <div class="alert {{ 'alert-success' if prediction=='Loan Approved' else 'alert-danger' }} mt-3">
            <h4>{{ prediction }}</h4>
            <p><strong>Probability:</strong> {{ probability }}</p>
        </div>
    </div>

    <!-- Edit Form -->
    <h4 class="text-center mb-3">Edit Values & Try Again</h4>

    <form action="/predict" method="POST" class="card p-4 shadow mb-3">

        <!-- Gender -->
        <label>Gender</label>
        <select name="Gender" class="form-control mb-3">
            <option value="Male" {% if previous_values['Gender']=='Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if previous_values['Gender']=='Female' %}selected{% endif %}>Female</option>
        </select>

        <!-- Married -->
        <label>Married</label>
        <select name="Married" class="form-control mb-3">
            <option value="Yes" {% if previous_values['Married']=='Yes' %}selected{% endif %}>Yes</option>
            <option value="No" {% if previous_values['Married']=='No' %}selected{% endif %}>No</option>
        </select>

        <!-- Dependents -->
        <label>Dependents</label>
        <select name="Dependents" class="form-control mb-3">
            <option value="0" {% if previous_values['Dependents']=='0' %}selected{% endif %}>0</option>
            <option value="1" {% if previous_values['Dependents']=='1' %}selected{% endif %}>1</option>
            <option value="2" {% if previous_values['Dependents']=='2' %}selected{% endif %}>2</option>
            <option value="3+" {% if previous_values['Dependents']=='3+' %}selected{% endif %}>3+</option>
        </select>

        <!-- Education -->
        <label>Education</label>
        <select name="Education" class="form-control mb-3">
            <option value="Graduate" {% if previous_values['Education']=='Graduate' %}selected{% endif %}>Graduate</option>
            <option value="Not Graduate" {% if previous_values['Education']=='Not Graduate' %}selected{% endif %}>Not Graduate</option>
        </select>

        <!-- Self Employed -->
        <label>Self Employed</label>
        <select name="Self_Employed" class="form-control mb-3">
            <option value="Yes" {% if previous_values['Self_Employed']=='Yes' %}selected{% endif %}>Yes</option>
            <option value="No" {% if previous_values['Self_Employed']=='No' %}selected{% endif %}>No</option>
        </select>

        <!-- Applicant Income -->
        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome"
               value="{{ previous_values['ApplicantIncome'] }}"
               class="form-control mb-3" required>

        <!-- Coapplicant Income -->
        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome"
               value="{{ previous_values['CoapplicantIncome'] }}"
               class="form-control mb-3" required>

        <!-- Loan Amount -->
        <label>Loan Amount</label>
        <input type="number" name="LoanAmount"
               value="{{ previous_values['LoanAmount'] }}"
               class="form-control mb-3" required>

        <!-- Loan Term -->
        <label>Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term"
               value="{{ previous_values['Loan_Amount_Term'] }}"
               class="form-control mb-3" required>

        <!-- Credit History -->
        <label>Credit History</label>
        <input type="number" name="Credit_History"
               min="0" max="1"
               value="{{ previous_values['Credit_History'] }}"
               class="form-control mb-3" required>

        <!-- Property Area -->
        <label>Property Area</label>
        <select name="Property_Area" class="form-control mb-3">
            <option value="Urban" {% if previous_values['Property_Area']=='Urban' %}selected{% endif %}>Urban</option>
            <option value="Semiurban" {% if previous_values['Property_Area']=='Semiurban' %}selected{% endif %}>Semiurban</option>
            <option value="Rural" {% if previous_values['Property_Area']=='Rural' %}selected{% endif %}>Rural</option>
        </select>

        <button type="submit" class="btn btn-primary w-100">
            Recalculate
        </button>

    </form>

    <a href="/" class="btn btn-secondary w-100">Start Fresh</a>

</div>

</body>
</html>
